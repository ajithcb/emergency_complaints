<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(to right,#6bdfd5,#29aa6e);padding:20px;}
h2{text-align:center;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th, td{padding:10px;border:1px solid #ccc;text-align:center;}
th{background:#2575fc;color:white;}
button{padding:5px 10px;border-radius:5px;border:none;cursor:pointer;margin:2px;}
.process{background:#3498db;color:white;}
.complete{background:#2ecc71;color:white;}
.nav{margin-bottom:20px;text-align:center;}
</style>
</head>
<body>
<div class="nav">
<button onclick="location.href='index.html'">Home</button>
</div>
<h2>All Complaints</h2>
<table id="complaints">
<tr><th>Email</th><th>Issue</th><th>Description</th><th>Status</th><th>Date/Time</th><th>Change Status</th></tr>
</table>

<script>
async function loadComplaints(){
  const res = await fetch("/admin/complaints");
  const data = await res.json();
  const table = document.getElementById("complaints");
  table.innerHTML = `<tr><th>Email</th><th>Issue</th><th>Description</th><th>Status</th><th>Date/Time</th><th>Change Status</th></tr>`;
  data.forEach(c=>{
    let color = c.status==="Pending"?"orange":c.status==="Processing"?"blue":"green";
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${c.username}</td>
      <td>${c.issue}</td>
      <td>${c.description}</td>
      <td style="color:${color}; font-weight:bold;">${c.status}</td>
      <td>${new Date(c.createdAt).toLocaleString()}</td>
      <td>
        <button class="process" onclick="updateStatus('${c._id}','Processing')">Processing</button>
        <button class="complete" onclick="updateStatus('${c._id}','Complete')">Complete</button>
      </td>`;
    table.appendChild(tr);
  });
}

async function updateStatus(id,status){
  await fetch("/admin/update",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id,status})
  });
  loadComplaints();
}

loadComplaints();
</script>
</body>
</html>
