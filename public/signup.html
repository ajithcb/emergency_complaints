<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup</title>
<style>
body { 
  margin:0; 
  height:100vh; 
  font-family:Arial; 
  /* Added a live high-quality abstract background image with a matching orange/red overlay tint */
  background: linear-gradient(rgba(255, 153, 102, 0), rgba(102, 42, 43, 0)), url('https://t4.ftcdn.net/jpg/03/92/76/55/360_F_392765556_c6QicoSHKnF01IjVEOwlWl6gmp6LDIWf.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  display:flex; 
  justify-content:center; 
  align-items:center; 
}
.box { background: rgba(233, 226, 247, 0.95); padding:30px; border-radius:15px; text-align:center;}
input { padding:10px; margin:10px; width:280px; border-radius:8px; border:1px solid #ccc;}
button { padding:10px 20px; border-radius:8px; border:none; background:#822a6f; color:white; cursor:pointer;}
button:hover { background:#6a11cb;}
</style>
</head>
<body>
<div class="box">
<h2>Signup</h2>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="signup()">Signup</button>
</div>
<script>
async function signup(){
  const email=document.getElementById('email').value;
  const password=document.getElementById('password').value;
  if(!email||!password){alert("Fill all fields");return;}
  const res=await fetch('/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
  const data=await res.json();
  alert(data.message);
  if(data.message==="Signup successful") window.location.href="login.html";
}
</script>
</body>
</html>
