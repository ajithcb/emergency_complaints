<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body { 
  margin:0; 
  height:100vh; 
  font-family:Arial; 
  /* Added a live high-quality background image with a matching overlay tint */
  background: linear-gradient(rgba(1, 39, 27, 0), rgba(24, 91, 157, 0)), url('https://t4.ftcdn.net/jpg/03/92/76/55/360_F_392765556_c6QicoSHKnF01IjVEOwlWl6gmp6LDIWf.jpg'); 
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  display:flex; 
  justify-content:center; 
  align-items:center; 
}
.box { background: rgb(203, 187, 248); padding:30px; border-radius:25px; text-align:center;}
input { padding:10px; margin:10px; width:280px; border-radius:8px; border:1px solid #ccc;}
button { padding:10px 20px; border-radius:8px; border:none; background:#2d4f89; color:white; cursor:pointer;}
button:hover { background:#6a11cb;}
</style>
</head>
<body>
<div class="box">
<h2>Login</h2>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>
<script>
async function login(){
  const email=document.getElementById('email').value;
  const password=document.getElementById('password').value;
  const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
  const data=await res.json();
  alert(data.message);
  if(data.message==="Login successful"){ localStorage.setItem("email",email); window.location.href="submit.html"; }
}
</script>
</body>
</html>
