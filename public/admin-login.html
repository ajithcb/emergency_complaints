<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<style>
body{margin:0;height:100vh;font-family:Arial;background:linear-gradient(to right,#8263d2,#0e2f67);display:flex;justify-content:center;align-items:center;}
.box{background:rgba(197, 177, 205, 0.95);padding:30px;border-radius:15px;text-align:center;width:280px;}
input{padding:10px;margin:10px;width:80%;border-radius:15px;border:1px solid #ccc;}
button{padding:10px 20px;border-radius:8px;border:none;background:#541b9a;color:white;cursor:pointer;}
button:hover{background:#8162a2;}
.nav{margin-bottom:20px;}
</style>
</head>
<body>
<div class="box">
<h2>Admin Login</h2>
<input type="text" id="username" placeholder="Username"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>
<script>
async function login(){
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const res = await fetch("/admin/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,password})
  });
  const data = await res.json();
  alert(data.message);
  if(data.message==="Admin login successful") window.location.href="admin.html";
}
</script>
</body>
</html>
