<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Submit Complaint</title>
<style>
body{
  margin:0; 
  height:100vh; 
  font-family:Arial; 
  /* Added a live high-quality abstract background image with a matching warm overlay tint */
  background: linear-gradient(rgba(126, 60, 192, 0.977), rgba(192, 187, 216, 0.966)), url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSv42oTuho23pZiZ-MC5yeMDDM0Nob_Ry01vBo5kDS3aA&s');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  display:flex; 
  justify-content:center; 
  align-items:center;
}
.box{background: rgb(216, 204, 248); padding:30px; border-radius:15px; text-align:center;}
input, select, textarea{padding:10px; margin:10px; width:220px; border-radius:8px; border:1px solid #ccc;}
button{padding:10px 20px; border-radius:8px; border:none; background:#2575fc; color:white; cursor:pointer;}
button:hover{background:#6a11cb;}
</style>
</head>
<body>
<div class="box">
<h2>Submit Complaint</h2>
<select id="issue">
<option value="">Select Issue</option>
<option value="Road Issue">Road Issue</option>
<option value="Electricity">Electricity</option>
<option value="Water Supply">Water Supply</option>
<option value="Fire">Fire</option>
<option value="Medical">Medical</option>
</select><br>
<textarea id="description" placeholder="Describe the issue..." rows="4"></textarea><br>
<button onclick="submitComplaint()">Submit</button>
<button onclick="location.href='track.html'">Track My Complaints</button>
</div>
<script>
async function submitComplaint(){
  const email=localStorage.getItem("email");
  const issue=document.getElementById("issue").value;
  const description=document.getElementById("description").value;
  if(!issue||!description){alert("Fill all fields");return;}
  const res=await fetch("/submit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,issue,description})});
  const data=await res.json();
  alert(data.message);
  document.getElementById("description").value=""; document.getElementById("issue").value="";
}
</script>
</body>
</html>
