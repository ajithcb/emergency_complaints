<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Track Complaints</title>
<style>
body{margin:0;font-family:Arial;background: linear-gradient(to right,#8bd5e2,#aac0da9d);}
.container{width:80%; margin:50px auto; background:rgba(255,255,255,0.95); padding:20px; border-radius:15px;}
table{width:100%; border-collapse:collapse;}
th,td{border:1px solid #ccc; padding:10px; text-align:center;}
th{background:#2575fc; color:white;}
</style>
</head>
<body>
<div class="container">
<h2>My Complaints</h2>
<table id="complaintsTable">
<thead>
<tr><th>Issue</th><th>Description</th><th>Status</th></tr>
</thead>
<tbody></tbody>
</table>
</div>
<script>
async function loadComplaints(){
  const email=localStorage.getItem("email");
  const res=await fetch(`/track/${email}`);
  const data=await res.json();
  const tbody=document.querySelector("#complaintsTable tbody");
  tbody.innerHTML="";
  data.forEach(c=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${c.issue}</td><td>${c.description}</td><td>${c.status}</td>`;
    tbody.appendChild(tr);
  });
}
loadComplaints();
</script>
</body>
</html>
